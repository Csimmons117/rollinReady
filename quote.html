<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollin Ready Inc.</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#000;
border-bottom:2px solid #1e90ff;
}

.logoa{
text-decoration:none;
color:#1e90ff;
}

.logo{
display:flex;
align-items:center;
font-size:22px;
font-weight:bold;
color:#1e90ff;
}

.logo img{
height:50px;
margin-right:10px;
}

nav a{
margin-left:25px;
text-decoration:none;
color:white;
font-size:15px;
transition:.3s;
}

nav a:hover{
color:#1e90ff;
}

/* TITLE */

.quotetitle{
text-align:center;
padding:70px 20px 30px 20px;
}

.quotetitle h3{
font-size:36px;
color:#1e90ff;
font-weight:600;
}

/* FORM SECTION */

.quote{
display:flex;
justify-content:center;
padding:20px;
}

.formQuote{
background:#111;
padding:40px;
border-radius:10px;
width:100%;
max-width:600px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
border:1px solid #1e90ff33;
}

/* FORM ELEMENTS */

label{
display:block;
font-size:15px;
margin-bottom:8px;
margin-top:18px;
color:#1e90ff;
}

input,
textarea{
width:100%;
padding:14px;
font-size:15px;
border-radius:6px;
border:1px solid #333;
background:#0b0b0b;
color:white;
outline:none;
transition:.25s;
}

input:focus,
textarea:focus{
border-color:#1e90ff;
box-shadow:0 0 6px #1e90ff44;
}

textarea{
min-height:140px;
resize:vertical;
}

/* BUTTON */

button{
margin-top:25px;
width:100%;
padding:14px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:6px;
background:#1e90ff;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0f6ed6;
}

</style>
</head>

<body>

<header>

<div class="logo">
<a class="logoa" href="./index.html">
<img src="./pictures/logo-half-bg.png" alt="Rollin Ready Inc Logo">
</a>
<a class="logoa" href="./index.html">ROLLIN READY INC.</a>
</div>

<nav>
<a href="./index.html">Home</a>
<a href="./index.html#services">Services</a>
<a href="./index.html#gallery">Gallery</a>
<a href="./index.html#contact">Contact</a>
</nav>

</header>

<div class="quotetitle">
<h3>Request a Quote</h3>
</div>

<div class="quote">

<div class="formQuote">

<form>

<label for="fullname">Full Name</label>
<input type="text" id="fullname" name="fullname" required>

<label for="contactinfo">Best Way to Reach You</label>
<input type="text" id="contactinfo" name="contactinfo" required>

<label for="reason">What are you looking for?</label>
<textarea id="reason" name="reason" required></textarea>

<button type="submit">Submit Request</button>

</form>

</div>

</div>

</body>
<script>

const form = document.querySelector("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbweI9LULsHpJNALV0Dmf8kO5V-B8VF0LZmz1SGLTiPax9PzF8pBOVobwtBHRAauZJQ1/exec", {
    method: "POST",
    body: formData
  })
  .then(response => response.text())
  .then(data => {
    alert("Quote submitted successfully!");
    form.reset();
  })
  .catch(error => {
    console.error("Error!", error.message);
  });

});

</script>
</html>
